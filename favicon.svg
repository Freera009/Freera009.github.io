<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="9" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="16" rx="9" fill="url(#shine)"/>
  <!-- Circuit node dots — AI feel -->
  <circle cx="6" cy="6" r="1.2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="26" cy="6" r="1.2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="6" cy="26" r="1.2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="26" cy="26" r="1.2" fill="rgba(255,255,255,0.4)"/>
  <!-- Subtle connecting lines -->
  <line x1="6" y1="6" x2="26" y2="6" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
  <line x1="6" y1="26" x2="26" y2="26" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
  <line x1="6" y1="6" x2="6" y2="26" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
  <line x1="26" y1="6" x2="26" y2="26" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
  <!-- Italic serif F — Fraunces style -->
  <text x="8" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700" font-style="italic" fill="white" letter-spacing="-1">F</text>
  <!-- Small accent spark top-right -->
  <circle cx="23" cy="9" r="2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="23" cy="9" r="1" fill="#c026d3"/>
</svg>
